name: Build & Format Check

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'packages/api/**'
            web:
              - 'packages/web/**'

  api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: API format check
        run: pnpm --filter @ara/api format:check

      - name: Build TypeScript
        run: pnpm --filter @ara/api build

      - name: Build Success
        if: success()
        run: echo "✅ Build completed successfully!"

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Web format check
        run: pnpm --filter @ara/web format:check

      - name: Build TypeScript
        run: pnpm --filter @ara/web build

      - name: Build Success
        if: success()
        run: echo "✅ Build completed successfully!"